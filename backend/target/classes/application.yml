server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/movie_ticket?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: clh123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms
      password: clh123456
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# 自定义配置
app:
  jwt:
    secret: MovieTicketBookingSystemSecretKey2026MustBeLongEnoughForHS256Algorithm
    expiration: 604800000  # 7天 (毫秒)
  upload:
    path: ./uploads/
    url-prefix: /uploads/
  seat-lock:
    ttl-seconds: 900  # 15分钟

logging:
  level:
    com.moviebooking: INFO
    org.springframework.data.redis: WARN
